spring:
  application:
    name: asus-platform

  # Banco padrao: H2 em memoria (zero setup). Para PostgreSQL use o profile 'postgres'.
  datasource:
    url: jdbc:h2:mem:asus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Fase 11: limites de upload de assets
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 32MB

server:
  # Railway/Render injetam a porta via $PORT; cai para 8080 em local.
  port: ${PORT:8080}

logging:
  level:
    com.asus.platform: INFO

# Configuracoes da plataforma ASUS
asus:
  # Fase 11: diretorio de uploads (storage local no MVP; trocar por S3/R2/GCS em producao).
  # Em producao aponte ASUS_UPLOADS_DIR para um volume persistente (ex.: /app/uploads).
  uploads-dir: ${ASUS_UPLOADS_DIR:uploads}
  # Fase 7: seguranca / JWT (defina ASUS_JWT_SECRET em producao com >= 32 bytes)
  jwt:
    secret: ${ASUS_JWT_SECRET:troque-este-segredo-em-producao-asus-rpg-platform-0123456789}
    access-ttl-min: 15
    refresh-ttl-days: 7
  cors:
    allowed-origins: ${ASUS_CORS_ORIGINS:*}
  security:
    # false (dev): API aberta, so /api/auth/me exige token. true (prod): exige token em /api/**
    enforce: ${ASUS_SECURITY_ENFORCE:false}

  # --- Integracoes externas (plugar credenciais). Ver INTEGRACOES.md na raiz. ---
  # Storage de assets: 'local' (padrao) ou 's3' (S3/R2/GCS S3-compativel).
  storage:
    tipo: ${ASUS_STORAGE_TIPO:local}
    s3:
      bucket: ${ASUS_S3_BUCKET:}
      region: ${ASUS_S3_REGION:auto}
      endpoint: ${ASUS_S3_ENDPOINT:}            # R2/GCS: endpoint S3-compativel; AWS S3: deixe vazio
      access-key: ${ASUS_S3_ACCESS_KEY:}
      secret-key: ${ASUS_S3_SECRET_KEY:}
      public-base-url: ${ASUS_S3_PUBLIC_BASE_URL:}
  # Pagamentos: 'manual' (padrao), 'stripe' ou 'mercadopago'.
  payments:
    provider: ${ASUS_PAYMENTS_PROVIDER:manual}
    success-url: ${ASUS_PAYMENTS_SUCCESS_URL:}
    cancel-url: ${ASUS_PAYMENTS_CANCEL_URL:}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    mercadopago:
      access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
  # Login social Google (OAuth2). Requer a dependencia spring-boot-starter-oauth2-client.
  oauth:
    google:
      enabled: ${ASUS_OAUTH_GOOGLE_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
